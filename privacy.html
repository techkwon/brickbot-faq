<head>

<body>
  <a class="skip-link" href="#main">본문으로 바로가기</a>
  <header class="topbar"><a class="brand" href="./"><span class="brand-mark" aria-hidden="true">B</span><span>BRICKBOT FAQ</span></a></header>
  <main id="main" class="policy-page">
    <p class="eyebrow">PUBLIC DATA POLICY</p>
    <h1>공개 데이터 정책</h1>
    <div class="policy-card">
      <h2>게시하는 정보</h2>
      <ul>
        <li>공개 가능한 표준 질문과 답변</li>
        <li>일반적인 분류, 태그, 집계 기간</li>
        <li>개인과 원문을 식별할 수 없는 통계</li>
      </ul>
    </div>
    <div class="policy-card warning-card">
      <h2>게시하지 않는 정보</h2>
      <ul>
        <li>카카오톡 원문, 작성자명, 메시지 ID</li>
        <li>전화번호, 이메일 등 개인정보</li>
        <li>비밀번호, 인증정보, 개인별 배치 상담</li>
        <li>Drive, 배치표, 초대 링크 등 내부 URL</li>
      </ul>
    </div>
    <a class="brutal-button" href="./">FAQ로 돌아가기</a>
  </main>
  <footer><p>공개용으로 정리된 FAQ입니다.</p></footer>
